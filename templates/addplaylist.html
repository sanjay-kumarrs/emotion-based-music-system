{% extends 'adminindex.html' %}
{% block body %}
<form id="form1" name="form1" enctype="multipart/form-data" method="post" action="/playlistcode">
  <table width="200" border="1" class="table table-striped">
    <tr>
      <td width="85"><div align="right">Song</div></td>
      <td colspan="2"><label>
        <input type="text" name="textfield"  required pattern="[A-Z a-z.]{3,25}" />
      </label></td>
    </tr>
    <tr class=" table table-dark">
      <td><div align="right">Genre</div></td>
      <td colspan="2"><label>
        <input type="text" name="textfield2" required />
      </label></td>
    </tr>
    <tr>
      <td><div align="right">Musician</div></td>
      <td colspan="2"><label>
        <input type="text" name="textfield3" required />
      </label></td>
    </tr>
	<tr>
      <td><div align="right">Emotion</div></td>
      <td colspan="2"><label>
        <select name="textfield4" type = "text">
          <option value=" ">  </option>
          <option value="happy">happy</option>
          <option value="sad">sad</option>
          <option value="neutral">neutral</option>
          <option value="disgust">disgust</option>
          <option value="anger">anger</option>
          <option value="surprise">surprise</option>
        </select>
        
      </label></td>
    </tr>
    <tr>
      <td><div align="right">File</div></td>
      <td width="19">
        <input type="file" name="file"  required/>
      </td>
    </tr>
    <tr>
      <td><div align="right">Details</div></td>
      <td colspan="2"><label>
          <textarea name="textarea"></textarea>
      </label></td>
    </tr>
    <tr>
      <td colspan="3"><label>
        <div align="center">
          <input type="submit" name="Submit" value="Add" />
          </div>
      </label></td>
    </tr>
  </table>
  <label></label>
</form>
{% endblock %}
